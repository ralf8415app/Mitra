<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#66d6ea" />
  <title>Dragon Stone Rescue</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header class="hud">
      <button id="settingsBtn" class="round" aria-label="Einstellungen">⚙</button>
      <div class="stats">
        <strong id="levelLabel">Level 1</strong>
        <span>Fortschritt: <b id="progressLabel">0%</b></span>
      </div>
      <button id="speedBtn" class="pill">⏩ x1</button>
    </header>

    <section class="game-wrap">
      <canvas id="gameCanvas" width="720" height="940" aria-label="Spiel"></canvas>
      <div id="message" class="message hidden"></div>
    </section>

    <section class="launcher-panel">
      <div class="next-row">
        <span>Nächste Kugel</span>
        <div id="nextBall" class="preview-ball"></div>
      </div>
      <div class="instructions">Zielen: Feld antippen · Schießen: loslassen · Gleiche Farbe trifft</div>
      <div class="boosters">
        <button id="rainbowBtn">🌈 <b id="rainbowCount">3</b></button>
        <button id="bombBtn">💣 <b id="bombCount">2</b></button>
        <button id="shieldBtn">🛡️ <b id="shieldCount">1</b></button>
      </div>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button id="closeModal" class="close" aria-label="Schließen">×</button>
      <h2 id="modalTitle"></h2>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
